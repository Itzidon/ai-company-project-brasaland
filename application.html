<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Solicitud - Brasaland</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 text-gray-800">

  <!-- NAVBAR -->
  <nav class="bg-black text-white p-4">
    <div class="max-w-5xl mx-auto flex justify-between items-center">
      <a href="index.html" class="font-bold text-xl">Brasaland</a>

      <div class="flex gap-4">
        <a href="index.html" class="hover:text-yellow-400">Inicio</a>
        <a href="index.html#servicios" class="hover:text-yellow-400">Servicios</a>
        <a href="index.html#contacto" class="hover:text-yellow-400">Contacto</a>
        <a href="application.html" class="hover:text-yellow-400">Reservar</a>
      </div>
    </div>
  </nav>

  <main class="max-w-3xl mx-auto bg-white p-8 mt-8 rounded-lg shadow">

    <h1 class="text-3xl font-bold mb-6 text-center">Solicitud de Servicio</h1>

    <form id="applicationForm" class="space-y-5" novalidate 
          onsubmit="alert('Reserva enviada correctamente'); return false;">

      <div>
        <label for="fullName" class="block font-semibold">Nombre completo</label>
        <input type="text" id="fullName" class="w-full border p-2 rounded" required>
        <p id="error-fullName" class="text-red-500 text-sm"></p>
      </div>

      <div>
        <label for="email" class="block font-semibold">Correo electrónico</label>
        <input type="email" id="email" class="w-full border p-2 rounded" required>
        <p id="error-email" class="text-red-500 text-sm"></p>
      </div>

      <div>
        <label for="phone" class="block font-semibold">Teléfono</label>
        <input type="tel" id="phone" class="w-full border p-2 rounded" required>
        <p id="error-phone" class="text-red-500 text-sm"></p>
      </div>

      <div>
        <label for="country" class="block font-semibold">País</label>
        <select id="country" class="w-full border p-2 rounded" required>
          <option value="">Selecciona</option>
          <option>Colombia</option>
          <option>Estados Unidos</option>
        </select>
      </div>

      <div>
        <label for="city" class="block font-semibold">Ciudad</label>
        <input type="text" id="city" class="w-full border p-2 rounded" required>
      </div>

      <div>
        <label for="serviceType" class="block font-semibold">Tipo de servicio</label>
        <select id="serviceType" class="w-full border p-2 rounded" required>
          <option value="">Selecciona</option>
          <option>reserva</option>
          <option>evento</option>
          <option>catering</option>
        </select>
      </div>

      <div>
        <label for="eventDate" class="block font-semibold">Fecha</label>
        <input type="date" id="eventDate" class="w-full border p-2 rounded" required>
        <p id="error-date" class="text-red-500 text-sm"></p>
      </div>

      <div>
        <label for="guestCount" class="block font-semibold">Número de personas</label>
        <input type="number" id="guestCount" class="w-full border p-2 rounded" required min="1">
      </div>

      <div>
        <label for="estimatedBudget" class="block font-semibold">Presupuesto estimado (opcional)</label>
        <input type="number" id="estimatedBudget" class="w-full border p-2 rounded">
      </div>

      <div>
        <label for="notes" class="block font-semibold">Comentarios</label>
        <textarea id="notes" class="w-full border p-2 rounded" maxlength="500"></textarea>
      </div>

      <div class="flex items-center gap-2">
        <input type="checkbox" id="termsAccepted" aria-required="true">
        <label for="termsAccepted">Acepto los términos y condiciones</label>
      </div>
      <p id="error-terms" class="text-red-500 text-sm"></p>

      <div class="flex gap-4 justify-center mt-6">
        <button type="submit" class="bg-black text-white px-6 py-2 rounded hover:bg-gray-800">
          Enviar
        </button>
        <button type="reset" class="bg-gray-300 px-6 py-2 rounded hover:bg-gray-400">
          Limpiar
        </button>
      </div>

      <p id="successMessage" class="text-green-600 text-center font-semibold mt-4"></p>

    </form>

  </main>

  <script src="validation.js"></script>

</body>
</html>
